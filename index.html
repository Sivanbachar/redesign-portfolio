<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sivan Baum, Product Designer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    #loading-screen {
      position: fixed; inset: 0; background: #050505;
      display: flex; align-items: center; justify-content: center;
      z-index: 9999; transition: opacity 0.5s ease;
    }
    #loading-screen.fade { opacity: 0; pointer-events: none; }
    .loader-dot { width: 6px; height: 6px; border-radius: 50%; background: #fff; margin: 0 4px; animation: bounce 1s infinite ease-in-out; }
    .loader-dot:nth-child(2) { animation-delay: 0.15s; }
    .loader-dot:nth-child(3) { animation-delay: 0.3s; }
    @keyframes bounce { 0%,80%,100%{transform:scale(0);opacity:0.3} 40%{transform:scale(1);opacity:1} }
  
/* ── Keyboard nav hint (projects section only, bottom-left) ── */
.kb-hint {
  position: fixed; bottom: 36px; left: 40px; z-index: 400;
  display: flex; flex-direction: row; align-items: center; gap: 8px;
  pointer-events: none;
  opacity: 0; transform: translateY(6px);
  transition: opacity 0.5s ease, transform 0.5s ease;
  white-space: nowrap;
}
.kb-hint.vis { opacity: 1; transform: translateY(0); }
.kb-hint-text {
  font-family: var(--mono); font-size: 9px;
  letter-spacing: 0.2em; text-transform: uppercase; color: var(--txt3);
}
.kb-keys { display: flex; flex-direction: row; align-items: center; gap: 4px; }
.kb-key {
  width: 22px; height: 22px;
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 4px;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--sans); font-size: 11px; color: var(--txt3);
  animation: keyPulse 2.4s ease-in-out infinite;
}
.kb-key:last-child { animation-delay: 0.5s; }
@keyframes keyPulse {
  0%,100% { border-color: rgba(255,255,255,0.18); color: var(--txt3); }
  50%      { border-color: rgba(255,255,255,0.38); color: var(--txt2); }
}

</style>
</head>
<body>
  <div id="loading-screen"><div class="loader-dot"></div><div class="loader-dot"></div><div class="loader-dot"></div></div>
  <div id="root"></div>
  <script type="text/babel">
/* React globals provided by CDN */
const { useState, useEffect, useRef, useCallback } = React;

// ─────────────────────────────────────────────────────────────
// DESIGN SPEC
//   Satoshi → all headings + body
//   Cormorant Garamond → hero name + resume headings
//   DM Mono → nav, labels, tags
//   bg: #0A0A0A | cobalt: #1B3FFF | near-monochromatic palette
// ─────────────────────────────────────────────────────────────
const CSS = `
@import url('https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap');
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@400;500&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: auto; }

:root {
  --bg:      #0A0A0A;
  --bg1:     #111111;
  --bg2:     #161616;
  --txt:     #FFFFFF;
  --txt2:    rgba(255,255,255,0.5);
  --txt3:    rgba(255,255,255,0.22);
  --bdr:     rgba(255,255,255,0.08);
  --bdr2:    rgba(255,255,255,0.15);
  --hover:   rgba(255,255,255,0.04);
  --cobalt:  #1B3FFF;
  --cobalt2: rgba(27,63,255,0.12);
  --cobalt3: rgba(27,63,255,0.06);
  --sans:    'Satoshi', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --display: 'Cormorant Garamond', Georgia, serif;
  --mono:    'DM Mono', 'Courier New', monospace;
  --pad:     clamp(24px, 5vw, 80px);
  --max:     1200px;
  --nav:     68px;
}

html { scroll-behavior: smooth; font-size: 16px; }
body {
  background: var(--bg);
  color: var(--txt);
  font-family: var(--sans);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  overflow-x: hidden;
}
::-webkit-scrollbar { width: 2px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); }

/* ── Scroll reveal ── */
.sr {
  opacity: 0; transform: translateY(24px);
  transition: opacity 0.75s cubic-bezier(0.16,1,0.3,1),
              transform 0.75s cubic-bezier(0.16,1,0.3,1);
}
.sr.vis { opacity: 1; transform: none; }
.sr.d1  { transition-delay: 0.08s; }
.sr.d2  { transition-delay: 0.16s; }
.sr.d3  { transition-delay: 0.26s; }
.sr.d4  { transition-delay: 0.38s; }
.sr.d5  { transition-delay: 0.52s; }

.pg { animation: pgIn 0.5s cubic-bezier(0.16,1,0.3,1) both; transition: filter 0.28s cubic-bezier(0.16,1,0.3,1), transform 0.28s cubic-bezier(0.16,1,0.3,1); }
body.mega-open .pg { filter: blur(6px); transform: scale(0.995); }
@keyframes pgIn { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:none; } }

/* ── Progress bar ── */
.progress-bar {
  position: fixed; top:0; left:0; z-index:600;
  height: 1px; background: var(--cobalt);
  transform-origin: left; transition: transform 0.1s linear; width:100%;
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ NAV ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.nav {
  position: fixed; top:0; left:0; right:0; z-index:500;
  height: var(--nav);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 var(--pad);
  transition: background 0.35s ease, border-color 0.35s ease,
              transform 0.6s cubic-bezier(0.16,1,0.3,1),
              opacity 0.5s ease-out;
  border-bottom: 1px solid transparent;
  opacity: 1;
}
.nav.nav-hidden {
  transform: translateY(-105%);
  opacity: 0;
  transition: background 0.35s ease, border-color 0.35s ease,
              transform 0.55s cubic-bezier(0.4,0,0.8,0.6),
              opacity 0.4s ease-in;
}
.nav.sc {
  background: rgba(10,10,10,0.92);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-color: var(--bdr);
}
.nav-logo {
  cursor: pointer; background: none; border: none; padding: 0;
  display: flex; align-items: center;
  line-height: 1;
}
.logo-mark {
  position: relative; width: 24px; height: 24px;
  cursor: pointer; background: none; border: none; padding: 0;
}
.lm-logo-svg, .lm-home-svg {
  position: absolute; top: 0; left: 0; width: 24px; height: 24px; display: block;
}
.lm-p {
  transition: transform 0.45s cubic-bezier(0.4,0,0.2,1), opacity 0.35s ease;
  transform-box: fill-box; transform-origin: center;
}
.lm-hovered .lm-p1 { transform: translate(-7px,8px) rotate(-12deg); opacity: 0; }
.lm-hovered .lm-p2 { transform: translate(-8px,-7px) rotate(10deg); opacity: 0; }
.lm-hovered .lm-p3 { transform: translate(8px,7px) rotate(-8deg); opacity: 0; }
.lm-hovered .lm-p4 { transform: translate(7px,-8px) rotate(12deg); opacity: 0; }
.lm-home-svg {
  opacity: 0; transform: scale(0.65);
  transition: opacity 0.3s ease 0.1s, transform 0.35s cubic-bezier(0.34,1.56,0.64,1) 0.08s;
}
.lm-hovered .lm-home-svg { opacity: 1; transform: scale(1); }
.nav-links {
  display: flex; align-items: center; gap: 32px;
}
.nav-btn {
  font-family: var(--mono); font-size: 11px; font-weight: 500;
  letter-spacing: 0.04em; text-transform: uppercase;
  color: var(--txt2); cursor: pointer;
  background: none; border: none; padding: 0;
  line-height: 1;
  transition: color 0.2s;
}
.nav-btn:hover, .nav-btn.act { color: var(--txt); }

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ MEGA MENU ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.mega {
  position: fixed; top: var(--nav); left:0; right:0; z-index:490;
  background: rgba(10,10,10,0.97);
  backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
  border-bottom: 1px solid var(--bdr);
  padding: 32px var(--pad) 36px;
  opacity: 0; transform: translateY(-8px);
  pointer-events: none;
  transition: opacity 0.2s ease, transform 0.28s cubic-bezier(0.16,1,0.3,1);
}
.mega.open { opacity: 1; transform: none; pointer-events: all; }
.mega-inner { max-width: var(--max); margin: 0 auto; }
.mega-label {
  font-family: var(--mono); font-size: 9px; letter-spacing: 0.18em;
  text-transform: uppercase; color: var(--txt3); margin-bottom: 20px;
}
.mega-row {
  display: flex; gap: 20px; align-items: flex-start; overflow-x: auto;
  scrollbar-width: none; -ms-overflow-style: none;
}
.mega-row::-webkit-scrollbar { display: none; }
.mega-thumb { flex: 0 0 200px; cursor: pointer; transition: opacity 0.2s; }
.mega-thumb:hover { opacity: 0.7; }
.mega-thumb-img {
  width: 100%; aspect-ratio: 4/3; border-radius: 4px; overflow: hidden;
  background: var(--bg2); 
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 10px;
  transition: transform 0.3s cubic-bezier(0.16,1,0.3,1);
}
.mega-thumb:hover .mega-thumb-img { transform: scale(0.97); }
.mega-thumb-icon { font-size: 24px; opacity: 0.12; }
.mega-thumb-company {
  font-family: var(--mono); font-size: 9px; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--txt3); margin-bottom: 4px;
}
.mega-thumb-name {
  font-family: var(--sans); font-size: 13px; font-weight: 500;
  color: var(--txt2); letter-spacing: -0.01em;
}
.mega-thumb.dim { opacity: 0.28; cursor: default; }
.mega-thumb.dim:hover { opacity: 0.28; }
.mega-overlay {
  position: fixed; inset: 0; z-index: 480;
  background: rgba(0,0,0,0.5);
  opacity: 0; pointer-events: none; transition: opacity 0.25s;
}
.mega-overlay.open { opacity: 1; pointer-events: all; }

/* Mega menu layout — two column */
.mega-cols { display: flex; align-items: flex-start; gap: 0; }
.mega-col--work { flex: 1 1 auto; min-width: 0; }
.mega-col--ai { flex: 0 0 220px; }
.mega-divider {
  width: 1px; align-self: stretch;
  background: var(--bdr); margin: 0 32px;
  flex-shrink: 0;
}
.mega-ai-card { cursor: pointer; transition: opacity 0.2s; }
.mega-ai-card:hover { opacity: 0.7; }
.mega-ai-img {
  width: 100%; aspect-ratio: 16/10; border-radius: 4px; overflow: hidden;
  background: var(--bg2); margin-bottom: 10px;
  transition: transform 0.3s cubic-bezier(0.16,1,0.3,1);
}
.mega-ai-card:hover .mega-ai-img { transform: scale(0.97); }
.mega-ai-sub {
  font-family: var(--sans); font-size: 11px; color: var(--txt3);
  margin-top: 4px; line-height: 1.5; letter-spacing: 0;
}

/* AI PAGE */
.ai-pg { padding-top: var(--nav); }
.ai-header { padding: 80px var(--pad) 64px; border-bottom: 1px solid var(--bdr); }
.ai-header-inner { max-width: var(--max); margin: 0 auto; }
.ai-header-label { font-family: var(--mono); font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--txt3); margin-bottom: 24px; }
.ai-header-h1 { font-family: var(--sans); font-size: clamp(40px, 6vw, 72px); font-weight: 300; letter-spacing: -0.03em; line-height: 1.05; color: var(--txt); margin-bottom: 20px; }
.ai-header-sub { font-family: var(--sans); font-size: 16px; font-weight: 300; color: var(--txt2); line-height: 1.6; max-width: 520px; }
.ai-list { max-width: var(--max); margin: 0 auto; padding: 0 var(--pad); }
.ai-entry { padding: 80px 0; border-bottom: 1px solid var(--bdr); }
.ai-entry-meta { display: flex; align-items: center; gap: 16px; margin-bottom: 40px; }
.ai-entry-num { font-family: var(--mono); font-size: 11px; letter-spacing: 0.12em; color: var(--txt3); }
.ai-entry-status { font-family: var(--mono); font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase; color: #4caf6e; border: 1px solid rgba(76,175,110,0.3); border-radius: 2px; padding: 3px 8px; }
.ai-entry-body { display: grid; grid-template-columns: 1fr 1fr; gap: 64px; align-items: start; }
.ai-entry-label { font-family: var(--mono); font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--txt3); margin-bottom: 20px; }
.ai-entry-h2 { font-family: var(--sans); font-size: clamp(22px, 3vw, 32px); font-weight: 400; letter-spacing: -0.02em; line-height: 1.2; color: var(--txt); margin-bottom: 28px; }
.ai-entry-paras { display: flex; flex-direction: column; gap: 16px; margin-bottom: 48px; }
.ai-entry-p { font-family: var(--sans); font-size: 15px; font-weight: 300; color: var(--txt2); line-height: 1.7; }
.ai-learning { margin-bottom: 40px; }
.ai-learning-heading, .ai-tools-heading { font-family: var(--mono); font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--txt3); padding-bottom: 12px; border-bottom: 1px solid var(--bdr); margin-bottom: 0; }
.ai-learning-list { list-style: none; padding: 0; margin: 0; }
.ai-learning-item { display: flex; align-items: baseline; gap: 16px; padding: 14px 0; border-bottom: 1px solid var(--bdr); font-family: var(--sans); font-size: 13px; font-weight: 300; color: var(--txt2); line-height: 1.5; }
.ai-learning-num { font-family: var(--mono); font-size: 10px; letter-spacing: 0.08em; color: var(--txt3); flex-shrink: 0; }
.ai-tools-list { list-style: none; padding: 0; margin: 0; }
.ai-tool-item { display: flex; align-items: center; gap: 14px; padding: 14px 0; border-bottom: 1px solid var(--bdr); }
.ai-tool-icon { width: 36px; height: 36px; border-radius: 8px; background: var(--bg1); border: 1px solid var(--bdr); display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; color: var(--txt2); }
.ai-tool-info { display: flex; flex-direction: column; gap: 2px; }
.ai-tool-name { font-family: var(--sans); font-size: 13px; font-weight: 500; color: var(--txt); }
.ai-tool-role { font-family: var(--sans); font-size: 12px; font-weight: 300; color: var(--txt3); }
.ai-entry-img-wrap { position: sticky; top: calc(var(--nav) + 32px); }
.ai-entry-img-block { border-radius: 8px; overflow: hidden; border: 1px solid var(--bdr); box-shadow: 0 32px 64px rgba(0,0,0,0.4); }
.ai-entry-img { width: 100%; height: auto; display: block; }
.ai-more { padding: 100px var(--pad) 120px; }
.ai-more-inner { max-width: var(--max); margin: 0 auto; }
.ai-more-line { width: 40px; height: 1px; background: var(--bdr2); margin-bottom: 48px; }
.ai-more-label { font-family: var(--mono); font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--txt3); margin-bottom: 16px; }
.ai-more-h2 { font-family: var(--sans); font-size: clamp(32px, 5vw, 56px); font-weight: 300; letter-spacing: -0.03em; color: var(--txt); margin-bottom: 16px; }
.ai-more-p { font-family: var(--sans); font-size: 15px; font-weight: 300; color: var(--txt2); line-height: 1.7; max-width: 480px; margin-bottom: 40px; }
.ai-more-dots { display: flex; gap: 8px; align-items: center; }
.ai-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--bdr2); transition: background 0.3s; }
.ai-dot--active { background: var(--txt3); animation: dotPulse 2s ease-in-out infinite; }
@keyframes dotPulse { 0%,100%{opacity:0.4} 50%{opacity:1} }

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ INTERACTIVE HERO ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.hero-wrap {
  position: relative; min-height: 100vh;
  padding-top: var(--nav);
  overflow: hidden;
  will-change: transform, opacity, filter;
}

/* Subtle grid background */
.hero-grid {
  position: absolute; inset: 0; pointer-events: none; z-index: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.028) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.028) 1px, transparent 1px);
  background-size: 72px 72px;
}

/* Cursor spotlight radial gradient following mouse */
.hero-spotlight {
  position: absolute; inset: 0; pointer-events: none; z-index: 1;
  background: radial-gradient(
    500px circle at var(--mx, 50%) var(--my, 50%),
    rgba(27,63,255,0.04) 0%,
    transparent 70%
  );
  transition: background 0.1s;
}

/* Floating panels */
.hero-panels {
  position: absolute; inset: 0; z-index: 2; pointer-events: none;
}
.fp {
  position: absolute;
  background: rgba(17,17,17,0.88);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 6px;
  backdrop-filter: blur(8px);
  will-change: transform;
  transition: border-color 0.4s ease, box-shadow 0.4s ease;
  pointer-events: auto;
}
.fp:hover {
  border-color: rgba(27,63,255,0.35);
  box-shadow: 0 0 20px rgba(27,63,255,0.08), inset 0 0 0 1px rgba(27,63,255,0.12);
}

/* Panel A metrics fragment top right */
.fp-a {
  top: 18%; right: 10%;
  width: 172px; padding: 16px;
}
.fp-label {
  font-family: var(--mono); font-size: 8px; letter-spacing: 0.14em;
  text-transform: uppercase; color: var(--txt3); margin-bottom: 10px;
}
.fp-metric {
  font-family: var(--sans); font-size: 22px; font-weight: 700;
  letter-spacing: -0.04em; color: var(--txt); line-height: 1;
  margin-bottom: 4px;
}
.fp-sub {
  font-family: var(--mono); font-size: 9px; color: var(--txt3);
}
.fp-bar-row {
  display: flex; gap: 3px; margin-top: 12px;
}
.fp-bar {
  height: 3px; border-radius: 2px; background: var(--cobalt); opacity: 0.7;
}

/* Panel B navigation fragment lower left */
.fp-b {
  bottom: 22%; left: 8%;
  width: 148px; padding: 14px;
}
.fp-line {
  height: 1px; background: rgba(255,255,255,0.07);
  margin: 9px 0;
}
.fp-row {
  display: flex; align-items: center; gap: 8px;
}
.fp-dot {
  width: 5px; height: 5px; border-radius: 50%;
  background: var(--cobalt); opacity: 0.5;
  flex-shrink: 0;
}
.fp-dot.active { opacity: 1; }
.fp-text {
  font-family: var(--mono); font-size: 8px; letter-spacing: 0.08em;
  text-transform: uppercase; color: var(--txt3);
}

/* Panel C tag fragment upper left */
.fp-c {
  top: 22%; left: 7%;
  padding: 12px 14px;
  display: flex; flex-direction: column; gap: 6px;
}
.fp-tag {
  font-family: var(--mono); font-size: 8px; letter-spacing: 0.1em;
  text-transform: uppercase;
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 2px; padding: 4px 8px;
  color: var(--txt3); white-space: nowrap;
  display: inline-block;
}
.fp-tag.hi {
  color: var(--cobalt); border-color: rgba(27,63,255,0.3);
  background: rgba(27,63,255,0.05);
}

/* Panel D progress fragment lower right */
.fp-d {
  bottom: 26%; right: 8%;
  width: 160px; padding: 14px;
}
.fp-progress-row { margin-bottom: 8px; }
.fp-progress-label {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 4px;
}
.fp-progress-track {
  height: 2px; background: rgba(255,255,255,0.06); border-radius: 2px; overflow: hidden;
}
.fp-progress-fill {
  height: 100%; background: var(--cobalt); border-radius: 2px; opacity: 0.7;
}

/* Three.js blob canvas fullscreen behind content */
.hero-canvas {
  position: absolute; inset: 0; z-index: 3; pointer-events: none;
}
.hero-canvas canvas { display: block; }

/* Hero content */
.hero-content {
  position: relative; z-index: 10;
  min-height: 100vh;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  text-align: center;
  padding: 0 var(--pad) 60px;
  pointer-events: none;
}
.hero-name {
  font-family: var(--display); font-weight: 300;
  font-size: clamp(80px, 13vw, 180px);
  line-height: 0.9; letter-spacing: -0.03em;
  color: var(--txt); margin-bottom: 28px;
  user-select: none;
}
.hero-tagline {
  font-family: var(--mono); font-size: clamp(10px,1.1vw,12px);
  letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--txt2); margin-bottom: 40px; min-height: 1.5em;
}
.hero-desc {
  max-width: 460px; font-size: clamp(16px,1.6vw,19px);
  color: var(--txt2); line-height: 1.7; font-weight: 400;
}
.hero-desc strong { color: var(--txt); font-weight: 500; }
.hero-scroll {
  position: absolute; bottom: 32px; left: 50%;
  transform: translateX(-50%);
  display: flex; flex-direction: row; align-items: center; gap: 10px;
  font-family: var(--mono); font-size: 9px;
  letter-spacing: 0.2em; text-transform: uppercase; color: var(--txt3);
  animation: fadeIn 1s ease 1.5s both; pointer-events: none;
  white-space: nowrap;
}
@keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
.hero-scroll-chevron {
  font-size: 12px; line-height: 1;
  animation: chevronBob 2.2s ease-in-out infinite;
}
@keyframes chevronBob { 0%,100%{transform:translateY(0);opacity:0.4} 50%{transform:translateY(3px);opacity:1} }

/* Mobile ambient float (no cursor on touch) */
@media (max-width: 768px) {
  .fp-a { animation: floatA 6s ease-in-out infinite; }
  .fp-b { animation: floatB 7s ease-in-out infinite 0.5s; }
  .fp-c { animation: floatC 5.5s ease-in-out infinite 1s; }
  .fp-d { animation: floatD 6.5s ease-in-out infinite 0.8s; }
}
@keyframes floatA { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-4px,-8px)} }
@keyframes floatB { 0%,100%{transform:translate(0,0)} 50%{transform:translate(6px,-6px)} }
@keyframes floatC { 0%,100%{transform:translate(0,0)} 50%{transform:translate(4px,6px)} }
@keyframes floatD { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-6px,5px)} }

/* Reduce motion */
@media (prefers-reduced-motion: reduce) {
  .fp, .fp-a, .fp-b, .fp-c, .fp-d { animation: none !important; transition: none !important; }
  .sr { transition: none !important; }
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ INTRO STATEMENT ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.intro-sec {
  position: relative; z-index: 2;
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  padding: 0 var(--pad);
}
.intro-inner { max-width: var(--max); margin: 0 auto; width: 100%; position: relative; z-index: 3; }
.intro-statement {
  font-family: var(--sans); font-weight: 500;
  font-size: clamp(32px, 5.2vw, 68px);
  line-height: 1.1; letter-spacing: -0.03em;
  color: var(--txt); max-width: 900px;
  text-align: center; margin: 0 auto;
}
/* Gradient text: mauve → peach → sage → teal (matches reference image) */
.intro-gradient {
  background: linear-gradient(90deg,
    #c5b0cc 0%,
    #d49890 22%,
    #c8b080 40%,
    #8aacaa 65%,
    #3a6070 100%
  );
  background-size: 0% 100%;
  background-repeat: no-repeat;
  background-position: left center;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  transition: background-size 1.2s cubic-bezier(0.16, 1, 0.3, 1) 0.25s;
}
.sr.vis .intro-gradient {
  background-size: 100% 100%;
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ PROJECT PANELS ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.projects-sec { position: relative; z-index: 2; }
.proj-panel {
  min-height: 100vh; overflow: hidden;
  cursor: pointer; display: flex; align-items: stretch;
  transition: background 0.3s;
}
.proj-panel:hover { background: var(--hover); }
.proj-panel-inner {
  display: grid; grid-template-columns: 1fr 1fr;
  width: 100%; max-width: var(--max); margin: 0 auto;
  padding: 0 var(--pad); align-items: center;
}
.proj-text {
  padding: 80px 64px 80px 0;
  display: flex; flex-direction: column; justify-content: center;
}
.proj-counter {
  font-family: var(--mono); font-size: 10px; font-weight: 500;
  letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--txt3); margin-bottom: 20px;
}
.proj-type {
  font-family: var(--mono); font-size: 10px; letter-spacing: 0.08em;
  text-transform: uppercase; color: var(--txt3); margin-bottom: 14px;
}
.proj-company {
  font-family: var(--mono); font-size: 11px; letter-spacing: 0.06em;
  text-transform: uppercase; color: var(--txt2); margin-bottom: 16px;
}
.proj-title {
  font-family: var(--sans); font-weight: 500;
  font-size: clamp(36px, 4.5vw, 58px);
  line-height: 1.05; letter-spacing: -0.025em;
  color: var(--txt); margin-bottom: 20px;
}
.proj-desc {
  font-size: clamp(15px, 1.4vw, 17px); color: var(--txt2);
  line-height: 1.7; max-width: 420px; margin-bottom: 32px;
}
.proj-link {
  font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--txt2);
  display: inline-flex; align-items: center; gap: 8px;
  transition: color 0.2s;
}
.proj-panel:hover .proj-link { color: var(--txt); }
.proj-img-wrap { display: flex; align-items: center; justify-content: center; padding: 40px 0; }
.proj-img-block {
  width: 100%; max-width: 500px; aspect-ratio: 4/3;
  background: var(--bg2);
  border-radius: 8px; display: flex; align-items: center; justify-content: center;
  overflow: hidden;
  transition: transform 0.55s cubic-bezier(0.16,1,0.3,1), box-shadow 0.55s cubic-bezier(0.16,1,0.3,1);
}
.proj-img-block:hover {
  transform: scale(0.98) translateY(-6px);
  box-shadow: 0 28px 56px rgba(0,0,0,0.45);
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ VISUAL PLACEHOLDER ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.visual-placeholder {
  width: 100%; border: 1px dashed rgba(255,255,255,0.1);
  border-radius: 6px; background: rgba(255,255,255,0.015);
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; gap: 10px;
  padding: 40px 24px; text-align: center; min-height: 280px;
}
.vp-label {
  font-family: var(--mono); font-size: 9px; letter-spacing: 0.18em;
  text-transform: uppercase; color: rgba(255,255,255,0.22);
}
.vp-desc {
  font-family: var(--sans); font-size: 13px; color: rgba(255,255,255,0.18);
  max-width: 340px; line-height: 1.5;
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ CASE STUDY ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.cs-wrap { padding-top: var(--nav); position: relative; z-index: 2; }
.cs-hero {
  min-height: 60vh; display: flex; flex-direction: column;
  justify-content: flex-end; padding: 80px var(--pad) 80px;
  border-bottom: 1px solid var(--bdr); max-width: var(--max);
  margin: 0 auto; width: 100%;
}
.cs-tag {
  font-family: var(--mono); font-size: 10px; letter-spacing: 0.14em;
  text-transform: uppercase; color: var(--txt3); margin-bottom: 20px;
}
.cs-h1 {
  font-family: var(--sans); font-weight: 500;
  font-size: clamp(40px, 6vw, 86px);
  line-height: 1.0; letter-spacing: -0.03em; color: var(--txt);
  margin-bottom: 28px; max-width: 800px;
}
.cs-lead {
  font-size: clamp(17px, 1.8vw, 22px); color: var(--txt2);
  line-height: 1.65; max-width: 600px;
}
.cs-meta-row {
  display: grid; grid-template-columns: repeat(4, 1fr);
  border-top: 1px solid var(--bdr); border-bottom: 1px solid var(--bdr);
  max-width: var(--max); margin: 0 auto; width: 100%;
}
.cs-meta-cell {
  padding: 28px var(--pad); border-right: 1px solid var(--bdr);
}
.cs-meta-cell:last-child { border-right: none; }
.cs-meta-label {
  font-family: var(--mono); font-size: 9px; letter-spacing: 0.14em;
  text-transform: uppercase; color: var(--txt3); margin-bottom: 10px;
}
.cs-meta-val { font-size: 14px; color: var(--txt2); line-height: 1.5; }
.cs-body { max-width: var(--max); margin: 0 auto; padding: 0 var(--pad); width: 100%; }
.cs-section { padding: 80px 0; border-bottom: 1px solid var(--bdr); }
.cs-section:last-child { border-bottom: none; }
.cs-section-label {
  font-family: var(--mono); font-size: 9px; letter-spacing: 0.18em;
  text-transform: uppercase; color: var(--txt3); margin-bottom: 40px; display: block;
}
.cs-h2 {
  font-family: var(--sans); font-weight: 500;
  font-size: clamp(28px, 3.5vw, 48px);
  line-height: 1.05; letter-spacing: -0.025em;
  color: var(--txt); margin-bottom: 24px;
}
.cs-h3 {
  font-family: var(--sans); font-weight: 500;
  font-size: clamp(18px, 2vw, 24px);
  letter-spacing: -0.02em; color: var(--txt); margin-bottom: 12px;
}
.cs-p {
  font-size: clamp(15px, 1.4vw, 17px); color: var(--txt2);
  line-height: 1.8; max-width: 680px; margin-bottom: 20px;
}
.cs-p:last-child { margin-bottom: 0; }
.cs-p strong { color: var(--txt); font-weight: 500; }
.cs-2col { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; align-items: start; }
.cs-3col { display: grid; grid-template-columns: repeat(3, 1fr); gap: 28px; }
.cs-stat-block { padding: 28px; border: 1px solid var(--bdr); border-radius: 4px; background: var(--bg1); }
.cs-stat-num {
  font-family: var(--sans); font-weight: 700;
  font-size: clamp(36px, 4vw, 56px);
  letter-spacing: -0.04em; color: var(--txt); line-height: 1; margin-bottom: 8px;
}
.cs-stat-label {
  font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--txt3);
}
.cs-callout {
  border-left: 1px solid rgba(255,255,255,0.2);
  padding: 20px 28px; margin: 32px 0;
  background: rgba(255,255,255,0.02); border-radius: 0 4px 4px 0;
}
.cs-callout p {
  font-size: clamp(17px,1.7vw,21px); color: var(--txt2);
  line-height: 1.6; font-style: italic;
}
.cs-numbered-item { margin-bottom: 40px; }
.cs-num {
  font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em;
  color: var(--txt3); margin-bottom: 10px; display: block;
}
.cs-decision-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 1px;
  border: 1px solid var(--bdr); border-radius: 4px; overflow: hidden; margin-top: 20px;
}
.cs-decision-cell {
  padding: 28px; background: var(--bg1);
  border-right: 1px solid var(--bdr); border-bottom: 1px solid var(--bdr);
}
.cs-decision-cell:nth-child(2n) { border-right: none; }
.cs-decision-cell:nth-last-child(-n+2) { border-bottom: none; }
.cs-outcome-row {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px;
  border: 1px solid var(--bdr); border-radius: 4px; overflow: hidden; margin-top: 32px;
}
.cs-outcome-cell { padding: 28px 24px; background: var(--bg1); border-right: 1px solid var(--bdr); }
.cs-outcome-cell:last-child { border-right: none; }
.cs-outcome-label {
  font-family: var(--mono); font-size: 9px; letter-spacing: 0.14em;
  text-transform: uppercase; color: var(--txt3); margin-bottom: 10px;
}
.cs-outcome-val { font-size: 15px; color: var(--txt2); line-height: 1.5; }
.cs-step-num {
  font-family: var(--mono); font-size: 9px; letter-spacing: 0.18em;
  text-transform: uppercase; color: var(--txt3); margin-bottom: 10px; display: block;
}
.cs-back {
  font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--txt3); cursor: pointer;
  background: none; border: none; padding: var(--pad) var(--pad) 0;
  display: block; transition: color 0.2s;
}
.cs-back:hover { color: var(--txt); }
/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ CASE STUDY VISUAL COMPONENTS ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.cs-kpi-row { display: flex; gap: 1px; margin: 32px 0; border: 1px solid var(--bdr); border-radius: 4px; overflow: hidden; }
.cs-kpi { flex: 1; padding: 32px 28px; background: var(--bg1); border-right: 1px solid var(--bdr); }
.cs-kpi:last-child { border-right: none; }
.cs-kpi-num { font-family: var(--sans); font-weight: 700; font-size: clamp(48px, 5.5vw, 80px); letter-spacing: -0.04em; color: var(--txt); line-height: 1; margin-bottom: 12px; }
.cs-kpi-label { font-family: var(--mono); font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--txt3); margin-bottom: 8px; }
.cs-kpi-desc { font-size: 13px; color: var(--txt2); line-height: 1.5; }
.cs-bar-stat { padding: 32px 28px; border: 1px solid var(--bdr); border-radius: 4px; background: var(--bg1); }
.cs-bar-stat-num { font-family: var(--sans); font-weight: 700; font-size: clamp(56px,7vw,96px); letter-spacing: -0.04em; color: var(--txt); line-height: 1; margin-bottom: 12px; }
.cs-bar-track { height: 2px; background: var(--bdr2); border-radius: 2px; margin: 0 0 16px; overflow: hidden; }
.cs-bar-fill { height: 100%; background: rgba(255,255,255,0.45); border-radius: 2px; }
.cs-bar-label { font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--txt3); line-height: 1.5; }
.cs-pullquote { padding: 48px 48px 48px 56px; margin: 32px 0; border-top: 1px solid var(--bdr2); border-bottom: 1px solid var(--bdr2); position: relative; }
.cs-pullquote::before { content: '"'; font-family: var(--display); font-size: 96px; line-height: 1; color: rgba(255,255,255,0.07); position: absolute; top: 20px; left: 18px; user-select: none; pointer-events: none; }
.cs-pullquote-text { font-family: var(--display); font-weight: 300; font-size: clamp(22px,2.8vw,36px); line-height: 1.35; letter-spacing: -0.01em; color: var(--txt); font-style: italic; max-width: 820px; margin-bottom: 20px; }
.cs-pullquote-attr { font-family: var(--mono); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--txt3); }
.cs-finding-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; border: 1px solid var(--bdr); border-radius: 4px; overflow: hidden; margin-top: 28px; }
.cs-finding-grid.two-col { grid-template-columns: repeat(2, 1fr); }
.cs-finding { padding: 28px; background: var(--bg1); border-right: 1px solid var(--bdr); border-bottom: 1px solid var(--bdr); display: flex; flex-direction: column; }
.cs-finding:nth-child(3n) { border-right: none; }
.cs-finding-grid.two-col .cs-finding:nth-child(3n) { border-right: 1px solid var(--bdr); }
.cs-finding-grid.two-col .cs-finding:nth-child(2n) { border-right: none; }
.cs-finding:nth-last-child(-n+3) { border-bottom: none; }
.cs-finding-grid.two-col .cs-finding:nth-last-child(-n+2) { border-bottom: none; }
.cs-finding-tag { font-family: var(--mono); font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--txt3); margin-bottom: 14px; display: flex; align-items: center; gap: 7px; }
.cs-finding-tag::before { content: ''; display: inline-block; width: 4px; height: 4px; border-radius: 50%; background: rgba(255,255,255,0.28); flex-shrink: 0; }
.cs-finding-headline { font-family: var(--sans); font-weight: 500; font-size: 15px; letter-spacing: -0.01em; color: var(--txt); margin-bottom: 10px; line-height: 1.35; }
.cs-finding-body { font-size: 13px; color: var(--txt2); line-height: 1.65; flex: 1; }

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ DOT MATRIX ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.cs-dot-matrix { padding: 32px 28px; border: 1px solid var(--bdr); border-radius: 4px; background: var(--bg1); }
.cs-dot-grid { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 20px; max-width: 320px; }
.cs-dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.88); }
.cs-dot.empty { background: rgba(255,255,255,0.07); }
.cs-dot-fraction { font-family: var(--sans); font-weight: 700; font-size: clamp(28px,3vw,42px); letter-spacing: -0.04em; color: var(--txt); line-height: 1; margin-bottom: 10px; }
.cs-dot-fraction span { color: var(--txt3); font-weight: 400; font-size: 0.65em; }
.cs-dot-label { font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--txt3); line-height: 1.6; }

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ INSIGHT STATEMENT ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.cs-insight { padding: 56px 0 52px; border-top: 1px solid rgba(255,255,255,0.12); border-bottom: 1px solid rgba(255,255,255,0.06); margin: 48px 0; }
.cs-insight-label { font-family: var(--mono); font-size: 9px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--txt3); margin-bottom: 24px; display: block; }
.cs-insight-text { font-family: var(--display); font-weight: 300; font-size: clamp(26px,3.8vw,50px); line-height: 1.22; letter-spacing: -0.015em; color: rgba(255,255,255,0.88); font-style: italic; max-width: 880px; }
.cs-insight-text strong { font-style: normal; font-weight: 600; color: var(--txt); }

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ CONTRAST / MODEL COMPARISON ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.cs-contrast { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; border: 1px solid var(--bdr); border-radius: 4px; overflow: hidden; margin-top: 32px; }
.cs-contrast-col { padding: 32px 28px; background: var(--bg1); }
.cs-contrast-col.dim { background: var(--bg); }
.cs-contrast-col-label { font-family: var(--mono); font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--txt3); margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
.cs-contrast-col.dim .cs-contrast-col-label { opacity: 0.6; }
.cs-contrast-col-label::before { content: ''; display: inline-block; height: 1px; width: 18px; background: currentColor; flex-shrink: 0; }
.cs-contrast-title { font-family: var(--sans); font-weight: 500; font-size: clamp(18px,2vw,24px); letter-spacing: -0.02em; line-height: 1.2; margin-bottom: 20px; }
.cs-contrast-col.dim .cs-contrast-title { color: var(--txt2); }
.cs-contrast-col:not(.dim) .cs-contrast-title { color: var(--txt); }
.cs-contrast-item { padding: 11px 0; border-top: 1px solid var(--bdr); font-size: 13.5px; line-height: 1.55; }
.cs-contrast-col.dim .cs-contrast-item { color: var(--txt3); }
.cs-contrast-col:not(.dim) .cs-contrast-item { color: var(--txt2); }

/* Research method cards */

function useScramble(target, duration = 1600, delay = 600) {
  const [display, setDisplay] = useState("");
  const CHARS = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789·+—";
  useEffect(() => {
    let t = setTimeout(() => {
      const start = Date.now();
      const animate = () => {
        const elapsed = Date.now() - start;
        const progress = Math.min(elapsed / duration, 1);
        const resolved = Math.floor(progress * target.length);
        let result = "";
        for (let i = 0; i < target.length; i++) {
          if (i < resolved) result += target[i];
          else result += target[i] === " " ? " " : CHARS[Math.floor(Math.random() * CHARS.length)];
        }
        setDisplay(result);
        if (progress < 1) requestAnimationFrame(animate);
        else setDisplay(target);
      };
      requestAnimationFrame(animate);
    }, delay);
    return () => clearTimeout(t);
  }, [target]);
  return display;
}

function useReadingProgress() {
  const [pct, setPct] = useState(0);
  useEffect(() => {
    const onScroll = () => {
      const el = document.documentElement;
      const total = el.scrollHeight - el.clientHeight;
      setPct(total > 0 ? el.scrollTop / total : 0);
    };
    window.addEventListener("scroll", onScroll, { passive: true });
    return () => window.removeEventListener("scroll", onScroll);
  }, []);
  return pct;
}


function usePaginatedScroll(active = true) {
  useEffect(() => {
    if (!active) return;
    if (window.matchMedia('(pointer: coarse)').matches) return; // touch devices use native scroll

    const COOLDOWN = 800;   // ms cooldown long enough for smooth scroll to settle
    const THRESHOLD = 15;   // minimum deltaY to register as intentional scroll
    let lastNav = 0;
    let currentIdx = 0;     // track intended index, not live scrollY

    const getSections = () => [
      document.querySelector('.hero-wrap'),
      document.querySelector('.intro-sec'),
      ...Array.from(document.querySelectorAll('.proj-panel')),
      document.querySelector('.about-band'),
    ].filter(Boolean);

    // getBoundingClientRect gives true document-relative top regardless of
    // positioned ancestors (e.g. .projects-sec is position:relative)
    const docTop = (el) => el.getBoundingClientRect().top + window.scrollY;

    const syncIdx = () => {
      const sections = getSections();
      const mid = window.scrollY + window.innerHeight * 0.4;
      let best = 0;
      sections.forEach((s, i) => { if (docTop(s) <= mid) best = i; });
      currentIdx = best;
    };
    syncIdx();

    const goTo = (idx) => {
      const now = Date.now();
      if (now - lastNav < COOLDOWN) return;
      const sections = getSections();
      if (idx < 0 || idx >= sections.length) return;
      lastNav = now;
      currentIdx = idx;
      window.scrollTo({ top: docTop(sections[idx]), behavior: 'smooth' });
    };

    const onWheel = (e) => {
      e.preventDefault();
      if (Math.abs(e.deltaY) < THRESHOLD) return;
      goTo(currentIdx + (e.deltaY > 0 ? 1 : -1));

    const onKey = (e) => {

      if (e.key === 'ArrowUp'   || e.key === 'PageUp')   { e.preventDefault(); goTo(currentIdx - 1); }
    };

    window.addEventListener('wheel', onWheel, { passive: false });
    window.addEventListener('keydown', onKey);
    return () => {
      window.removeEventListener('wheel', onWheel);
      window.removeEventListener('keydown', onKey);
    };
  }, [active]);
}

function useScrollReveal() {
  useEffect(() => {
    const obs = new IntersectionObserver(
      (entries) => entries.forEach((e) => { if (e.isIntersecting) { e.target.classList.add("vis"); obs.unobserve(e.target); } }),
      { threshold: 0.08, rootMargin: "0px 0px -40px 0px" }
    );
    const els = document.querySelectorAll(".sr, .sr-slide-left, .sr-slide-right");
    els.forEach((el) => obs.observe(el));
    return () => obs.disconnect();
  });
}

function InteractiveHero() {
  const heroRef = useRef(null);
  const tagline = useScramble("SENIOR PRODUCT DESIGNER · AMAZON KINDLE");

  // ── Scroll parallax ──────────────────────────────────────────
  useEffect(() => {
    if (window.matchMedia('(pointer: coarse)').matches) return; // skip blur on touch — crashes mobile Safari
    const onScroll = () => {
      if (!heroRef.current) return;
      const p = Math.min(window.scrollY / (heroRef.current.offsetHeight * 0.55), 1);
      heroRef.current.style.filter    = `blur(${p * 7}px)`;
      heroRef.current.style.opacity   = 1 - p * 0.55;
      heroRef.current.style.transform = `translateY(${-p * 36}px)`;
    };
    window.addEventListener("scroll", onScroll, { passive: true });
    return () => window.removeEventListener("scroll", onScroll);
  }, []);

  return (
    <div className="hero-wrap" ref={heroRef}>
      <div className="hero-content">
        <h1 className="hero-name">Sivan<br />Baum</h1>
        <div className="hero-tagline">{tagline}</div>
        <p className="hero-desc">
          I design product experiences that shape <strong>strategy</strong>,<br />not just interfaces.
        </p>
        <div className="hero-scroll">
          <span>Scroll</span>
          <span className="hero-scroll-chevron">∨</span>
        </div>
      </div>
    </div>
  );
}

function KeyboardHint() {
  const [vis, setVis] = React.useState(false);
  React.useEffect(() => {
    const check = () => {
      const proj = document.querySelector('.projects-sec');
      if (!proj) return;
      const { top, bottom } = proj.getBoundingClientRect();
      setVis(top < window.innerHeight && bottom > 0);
    };
    window.addEventListener('scroll', check, { passive: true });
    // Polling fallback: paginated scroll uses scrollTo which fires scroll
    // events mid-animation; poll to catch final resting position too
    const interval = setInterval(check, 250);
    check();
    return () => {
      window.removeEventListener('scroll', check);
      clearInterval(interval);
    };
  }, []);
  return (
    <div className={`kb-hint${vis ? ' vis' : ''}`} aria-hidden="true">
      <span className="kb-hint-text">Scroll or use</span>
      <div className="kb-keys">
        <div className="kb-key">↑</div>
        <div className="kb-key">↓</div>
      </div>
    </div>
  );
}

// ELECTRIC GRID canvas-based electricity on grid sections
// ─────────────────────────────────────────────────────────────
function ElectricGrid() {
  useEffect(() => {
    const GRID = 56;
    let sparks  = [];
    let mouse   = { x: -9999, y: -9999 };
    let animId;

    // Insert a canvas INSIDE each grid section so z-index works correctly
    // hero: canvas z-2 sits below blob canvas z-3
    // intro: canvas z-2 sits below text (intro-inner) z-3
    const sections = [];
    ['.hero-wrap', '.intro-sec'].forEach(sel => {
      const el = document.querySelector(sel);
      if (!el) return;
      const cv = document.createElement('canvas');
      cv.style.cssText = 'position:absolute;top:0;left:0;pointer-events:none;z-index:2;';
      el.appendChild(cv);
      sections.push({ el, cv, ctx: cv.getContext('2d') });
    });

    if (!sections.length) return;

    const resize = () => {
      sections.forEach(({ el, cv }) => {
        cv.width  = el.offsetWidth;
        cv.height = el.offsetHeight;
      });
    };

    const spawn = () => {
      sections.forEach(({ el }) => {
        const r = el.getBoundingClientRect();
        if (mouse.x < r.left || mouse.x > r.right || mouse.y < r.top || mouse.y > r.bottom) return;

        const lx = mouse.x - r.left;
        const ly = mouse.y - r.top;
        const gx = Math.round(lx / GRID) * GRID;
        const gy = Math.round(ly / GRID) * GRID;

        // Horizontal streak travels along a nearby horizontal grid line
        if (Math.random() < 0.22) {
          const lineY = gy + (Math.round(Math.random() * 6) - 3) * GRID;
          const spd   = (2.2 + Math.random() * 3.0) * (Math.random() < 0.5 ? 1 : -1);
          sparks.push({
            sec: el, type: 'h',
            line: lineY, pos: gx, vel: spd,
            tail: 40 + Math.random() * 60,
            life: 0, max: 60 + Math.random() * 50,
            peak: 0.20 + Math.random() * 0.14,
          });
        }
        // Vertical streak travels along a nearby vertical grid line
        if (Math.random() < 0.22) {
          const lineX = gx + (Math.round(Math.random() * 6) - 3) * GRID;
          const spd   = (2.2 + Math.random() * 3.0) * (Math.random() < 0.5 ? 1 : -1);
          sparks.push({
            sec: el, type: 'v',
            line: lineX, pos: gy, vel: spd,
            tail: 40 + Math.random() * 60,
            life: 0, max: 60 + Math.random() * 50,
            peak: 0.20 + Math.random() * 0.14,
          });
        }
        if (sparks.length > 120) sparks.splice(0, sparks.length - 120);
      });
    };

    const draw = () => {
      animId = requestAnimationFrame(draw);
      spawn();
      sparks = sparks.filter(s => s.life < s.max);

      // Clear all canvases
      sections.forEach(({ cv, ctx }) => ctx.clearRect(0, 0, cv.width, cv.height));

      sparks.forEach(s => {
        s.life++;
        s.pos += s.vel;

        // Smooth sine envelope no flicker at all
        const t     = s.life / s.max;
        const alpha = s.peak * Math.sin(t * Math.PI);
        if (alpha < 0.006) return;

        const entry = sections.find(({ el }) => el === s.sec);
        if (!entry) return;
        const { ctx } = entry;

        // Head and tail coords
        const tailDir = s.vel > 0 ? -1 : 1;
        const hx = s.type === 'h' ? s.pos            : s.line;
        const hy = s.type === 'h' ? s.line            : s.pos;
        const tx = s.type === 'h' ? s.pos + tailDir * s.tail : s.line;
        const ty = s.type === 'h' ? s.line            : s.pos + tailDir * s.tail;

        // Gradient: transparent tail → bright head
        const g = ctx.createLinearGradient(tx, ty, hx, hy);
        g.addColorStop(0,    'rgba(160,205,255,0)');
        g.addColorStop(0.55, `rgba(185,218,255,${alpha * 0.38})`);
        g.addColorStop(1,    `rgba(215,233,255,${alpha})`);

        ctx.save();
        ctx.strokeStyle = g;
        ctx.lineWidth   = 0.8;
        ctx.shadowColor = `rgba(150,195,255,${alpha * 0.55})`;
        ctx.shadowBlur  = 4;
        ctx.beginPath();
        ctx.moveTo(tx, ty);
        ctx.lineTo(hx, hy);
        ctx.stroke();
        ctx.restore();
      });
    };

    resize();
    const onMove   = (e) => { mouse.x = e.clientX; mouse.y = e.clientY; };
    const onResize = () => resize();
    window.addEventListener('mousemove', onMove);
    window.addEventListener('resize',    onResize);
    draw();

    return () => {
      cancelAnimationFrame(animId);
      window.removeEventListener('mousemove', onMove);
      window.removeEventListener('resize',    onResize);
      sections.forEach(({ cv }) => cv.parentNode?.removeChild(cv));
    };
  }, []);

  return null;
}
