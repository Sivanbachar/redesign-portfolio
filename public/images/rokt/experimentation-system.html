<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Experimentation System — Rokt</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%;
    height: 100%;
    background: #F9F9F7;
    display: flex;
    justify-content: center;
    align-items: center;
  }
  svg { display: block; }
</style>
</head>
<body>

<svg
  width="1000"
  height="860"
  viewBox="0 0 1000 860"
  xmlns="http://www.w3.org/2000/svg"
  style="font-family:'Inter',system-ui,-apple-system,sans-serif;"
>

  <!-- ─── DEFS ──────────────────────────────────────────── -->
  <defs>
    <!-- Standard arrowhead: deep blue, small, clean -->
    <marker id="arr" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <polygon points="0 0.5, 8 3.5, 0 6.5" fill="#1B3A6B" opacity="0.85"/>
    </marker>
  </defs>

  <!-- ─── BACKGROUND ────────────────────────────────────── -->
  <rect width="1000" height="860" fill="#F9F9F7"/>

  <!-- ─── TITLE BLOCK ───────────────────────────────────── -->
  <text
    x="500" y="45"
    text-anchor="middle"
    fill="#111111"
    font-size="10.5"
    font-weight="500"
    letter-spacing="0.18em"
    font-family="Inter, sans-serif"
  >EXPERIMENTATION SYSTEM</text>

  <text
    x="500" y="62"
    text-anchor="middle"
    fill="#BBBBBB"
    font-size="9.5"
    font-weight="300"
    letter-spacing="0.07em"
    font-family="Inter, sans-serif"
  >Rokt · Checkout Ad Performance</text>

  <line x1="420" y1="75" x2="580" y2="75" stroke="#E2E2DE" stroke-width="0.6"/>

  <!-- ─── ARC ARROWS ─────────────────────────────────────
       Circle center: (500, 450)   radius: 250
       Nodes at 0°, 60°, 120°, 180°, 240°, 300°  (clockwise from top)
       Arc offsets: +18° from source, –18° from target
       x = 500 + 250·sin(θ)   y = 450 − 250·cos(θ)
  ───────────────────────────────────────────────────────── -->

  <!-- Arc 0 · Hypothesis → Design Variation  (18° → 42°) -->
  <!-- start: (577.3, 212.2)   end: (667.3, 264.2) -->
  <path
    d="M 577.3,212.2 A 250,250 0 0,1 667.3,264.2"
    fill="none" stroke="#1B3A6B" stroke-width="1.3"
    marker-end="url(#arr)" opacity="0.78"
  />

  <!-- Arc 1 · Design Variation → Experiment  (78° → 102°) -->
  <!-- start: (744.5, 398.0)   end: (744.5, 502.0) -->
  <path
    d="M 744.5,398.0 A 250,250 0 0,1 744.5,502.0"
    fill="none" stroke="#1B3A6B" stroke-width="1.3"
    marker-end="url(#arr)" opacity="0.78"
  />

  <!-- Arc 2 · Experiment → Measure  (138° → 162°) -->
  <!-- start: (667.3, 635.8)   end: (577.3, 687.8) -->
  <path
    d="M 667.3,635.8 A 250,250 0 0,1 577.3,687.8"
    fill="none" stroke="#1B3A6B" stroke-width="1.3"
    marker-end="url(#arr)" opacity="0.78"
  />

  <!-- Arc 3 · Measure → Learn  (198° → 222°) -->
  <!-- start: (422.7, 687.8)   end: (332.7, 635.8) -->
  <path
    d="M 422.7,687.8 A 250,250 0 0,1 332.7,635.8"
    fill="none" stroke="#1B3A6B" stroke-width="1.3"
    marker-end="url(#arr)" opacity="0.78"
  />

  <!-- Arc 4 · Learn → Iterate  (258° → 282°) -->
  <!-- start: (255.5, 502.0)   end: (255.5, 398.0) -->
  <path
    d="M 255.5,502.0 A 250,250 0 0,1 255.5,398.0"
    fill="none" stroke="#1B3A6B" stroke-width="1.3"
    marker-end="url(#arr)" opacity="0.78"
  />

  <!-- Arc 5 · Iterate → Hypothesis  (318° → 342°)  ← loop-back arc -->
  <!-- start: (332.7, 264.2)   end: (422.7, 212.2) -->
  <path
    d="M 332.7,264.2 A 250,250 0 0,1 422.7,212.2"
    fill="none" stroke="#1B3A6B" stroke-width="1.3"
    marker-end="url(#arr)" opacity="0.78"
  />

  <!-- ─── NODES ──────────────────────────────────────────
       Node centers at r=250 from (500,450):
       01 Hypothesis       (500,   200)
       02 Design Variation (716.5, 325)
       03 Experiment       (716.5, 575)
       04 Measure          (500,   700)
       05 Learn            (283.5, 575)
       06 Iterate          (283.5, 325)
  ───────────────────────────────────────────────────────── -->

  <!-- 01 · Hypothesis  (top, text-anchor: middle) -->
  <g font-family="Inter, sans-serif">
    <text x="500" y="157" text-anchor="middle" fill="#C0C0C0" font-size="8" font-weight="400" letter-spacing="0.18em">01</text>
    <text x="500" y="175" text-anchor="middle" fill="#111111" font-size="15.5" font-weight="500">Hypothesis</text>
    <text x="500" y="192" text-anchor="middle" fill="#999999" font-size="10" font-weight="300">Based on observed behavior</text>
    <text x="500" y="206" text-anchor="middle" fill="#999999" font-size="10" font-weight="300">or performance gaps</text>
  </g>

  <!-- 02 · Design Variation  (top-right, text-anchor: start) -->
  <g font-family="Inter, sans-serif">
    <text x="740" y="293" text-anchor="start" fill="#C0C0C0" font-size="8" font-weight="400" letter-spacing="0.18em">02</text>
    <text x="740" y="311" text-anchor="start" fill="#111111" font-size="15.5" font-weight="500">Design Variation</text>
    <text x="740" y="328" text-anchor="start" fill="#999999" font-size="10" font-weight="300">Imagery, layout, content,</text>
    <text x="740" y="342" text-anchor="start" fill="#999999" font-size="10" font-weight="300">or interaction pattern</text>
  </g>

  <!-- 03 · Experiment  (bottom-right, text-anchor: start) -->
  <g font-family="Inter, sans-serif">
    <text x="740" y="550" text-anchor="start" fill="#C0C0C0" font-size="8" font-weight="400" letter-spacing="0.18em">03</text>
    <text x="740" y="568" text-anchor="start" fill="#111111" font-size="15.5" font-weight="500">Experiment</text>
    <text x="740" y="585" text-anchor="start" fill="#999999" font-size="10" font-weight="300">A/B tested across real users</text>
    <text x="740" y="599" text-anchor="start" fill="#999999" font-size="10" font-weight="300">and partner environments</text>
  </g>

  <!-- 04 · Measure  (bottom, text-anchor: middle) -->
  <g font-family="Inter, sans-serif">
    <text x="500" y="722" text-anchor="middle" fill="#C0C0C0" font-size="8" font-weight="400" letter-spacing="0.18em">04</text>
    <text x="500" y="740" text-anchor="middle" fill="#111111" font-size="15.5" font-weight="500">Measure</text>
    <text x="500" y="757" text-anchor="middle" fill="#999999" font-size="10" font-weight="300">CTR  ·  conversion rate  ·  revenue per transaction</text>
  </g>

  <!-- 05 · Learn  (bottom-left, text-anchor: end) -->
  <g font-family="Inter, sans-serif">
    <text x="260" y="550" text-anchor="end" fill="#C0C0C0" font-size="8" font-weight="400" letter-spacing="0.18em">05</text>
    <text x="260" y="568" text-anchor="end" fill="#111111" font-size="15.5" font-weight="500">Learn</text>
    <text x="260" y="585" text-anchor="end" fill="#999999" font-size="10" font-weight="300">What influenced behavior?</text>
    <text x="260" y="599" text-anchor="end" fill="#999999" font-size="10" font-weight="300">What increased engagement?</text>
  </g>

  <!-- 06 · Iterate  (top-left, text-anchor: end) -->
  <g font-family="Inter, sans-serif">
    <text x="260" y="293" text-anchor="end" fill="#C0C0C0" font-size="8" font-weight="400" letter-spacing="0.18em">06</text>
    <text x="260" y="311" text-anchor="end" fill="#111111" font-size="15.5" font-weight="500">Iterate</text>
    <text x="260" y="328" text-anchor="end" fill="#999999" font-size="10" font-weight="300">Insights feed the next</text>
    <text x="260" y="342" text-anchor="end" fill="#999999" font-size="10" font-weight="300">set of hypotheses</text>
  </g>

  <!-- ─── CENTER LABEL ──────────────────────────────────── -->
  <text x="500" y="437" text-anchor="middle" fill="#E4E4E0" font-size="8.5" font-weight="400" letter-spacing="0.14em" font-family="Inter, sans-serif">CONTINUOUS</text>
  <text x="500" y="452" text-anchor="middle" fill="#E4E4E0" font-size="8.5" font-weight="400" letter-spacing="0.14em" font-family="Inter, sans-serif">IMPROVEMENT</text>
  <text x="500" y="467" text-anchor="middle" fill="#D8D8D4" font-size="14" font-weight="300" font-family="Inter, sans-serif">↻</text>

  <!-- ─── ANNOTATIONS ───────────────────────────────────── -->

  <!-- Left · near the Iterate↔Learn zone -->
  <text x="94" y="424" text-anchor="middle" fill="#CCCCCC" font-size="8.5" font-weight="300" letter-spacing="0.02em" font-family="Inter, sans-serif">40+ experiments</text>
  <text x="94" y="438" text-anchor="middle" fill="#CCCCCC" font-size="8.5" font-weight="300" letter-spacing="0.02em" font-family="Inter, sans-serif">across 10+ design</text>
  <text x="94" y="452" text-anchor="middle" fill="#CCCCCC" font-size="8.5" font-weight="300" letter-spacing="0.02em" font-family="Inter, sans-serif">directions</text>
  <!-- subtle tick line -->
  <line x1="150" y1="438" x2="163" y2="438" stroke="#DDDDDD" stroke-width="0.6"/>

  <!-- Right · near the Design Variation↔Experiment zone -->
  <text x="906" y="424" text-anchor="middle" fill="#CCCCCC" font-size="8.5" font-weight="300" letter-spacing="0.02em" font-family="Inter, sans-serif">Experiment velocity</text>
  <text x="906" y="438" text-anchor="middle" fill="#CCCCCC" font-size="8.5" font-weight="300" letter-spacing="0.02em" font-family="Inter, sans-serif">monthly → biweekly</text>
  <!-- subtle tick line -->
  <line x1="837" y1="438" x2="850" y2="438" stroke="#DDDDDD" stroke-width="0.6"/>

  <!-- Bottom · below Measure -->
  <text x="500" y="800" text-anchor="middle" fill="#CCCCCC" font-size="8.5" font-weight="300" letter-spacing="0.02em" font-family="Inter, sans-serif">↑  Improved revenue per transaction</text>

</svg>

</body>
</html>
